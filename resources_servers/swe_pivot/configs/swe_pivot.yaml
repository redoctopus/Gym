swe_pivot:
  resources_servers:
    swe_pivot:
      entrypoint: app.py
      domain: agent
      verified: false
      description: SWE pivot verifier for PivotRL on coding agent trajectories
      value: Improve coding agent fix-design decisions
swe_pivot_tool_simulation_agent:
  responses_api_agents:
    tool_simulation_agent:
      entrypoint: app.py
      max_steps: 1
      resources_server:
        type: resources_servers
        name: swe_pivot
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: train
        type: train
        jsonl_fpath: resources_servers/swe_pivot/data/train.jsonl
        gitlab_identifier:
          dataset_name: swe_pivot
          version: 0.0.1
          artifact_fpath: train.jsonl
        license: Apache 2.0
      - name: validation
        type: validation
        jsonl_fpath: resources_servers/swe_pivot/data/validation.jsonl
        gitlab_identifier:
          dataset_name: swe_pivot
          version: 0.0.1
          artifact_fpath: validation.jsonl
        license: Apache 2.0
      - name: example
        type: example
        jsonl_fpath: resources_servers/swe_pivot/data/example.jsonl
        license: Apache 2.0
