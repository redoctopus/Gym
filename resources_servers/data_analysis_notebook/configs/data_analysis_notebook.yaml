notebook_judge_model:
  responses_api_models:
    openai_model:
      entrypoint: app.py
      openai_base_url: ${policy_base_url}
      openai_api_key: ${policy_api_key}
      openai_model: openai/openai/gpt-5-mini

data_analysis_notebook:
  resources_servers:
    data_analysis_notebook:
      entrypoint: app.py
      domain: coding
      verified: false
      description: Data analysis tasks verified by executing notebooks and LLM judge vs reference output
      max_concurrent_executions: 2
      execute_timeout_secs: 120
      wall_clock_margin_secs: 90
      image_compare_mode: exact
      judge_model_server:
        type: responses_api_models
        name: notebook_judge_model
      judge_responses_create_params:
        input: []
        max_output_tokens: 1024
      judge_endpoint_max_concurrency: 32
      judge_prompt_template_fpath: prompt_templates/notebook_task_judge.txt
      judge_max_output_chars: 12000
      judge_probe_on_startup: true
      # Server-side directory for optional per-evaluation execution logs; verifier_metadata may override.
      # execution_log_directory: /tmp/dan_exec_logs
data_analysis_notebook_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: data_analysis_notebook
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
        - name: example
          type: example
          jsonl_fpath: resources_servers/data_analysis_notebook/data/example.jsonl
